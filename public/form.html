<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0088cc; color: white; border: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <h3>Lead adatok</h3>
    <label>Szolgáltatás típusa:</label>
    <select id="service">
        <option value="Klíma telepítés">Klíma telepítés</option>
        <option value="Karbantartás">Karbantartás</option>
        <option value="Javítás">Javítás</option>
    </select>
    
    <label>Megjegyzés:</label>
    <textarea id="note" rows="4" placeholder="Ügyfél igényei..."></textarea>
    
    <button onclick="sendData()">Mentés</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendData() {
            const urlParams = new URLSearchParams(window.location.search);
            const data = {
                contact_id: urlParams.get('id'),
                service: document.getElementById('service').value,
                note: document.getElementById('note').value
            };
            tg.sendData(JSON.stringify(data)); // Visszaküldi az adatot a botnak
            tg.close();
        }
    </script>
</body>
</html>
